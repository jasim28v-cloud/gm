<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | COSMIC GLASS 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        
        :root {
            --orange-vivid: #ff6600;
            --orange-glow: rgba(255, 102, 0, 0.4);
            --bg-deep: #010101;
            --glass-base: rgba(255, 255, 255, 0.015);
            --glass-border: rgba(255, 102, 0, 0.12);
        }

        body {
            margin: 0; background: var(--bg-deep); color: #fff; font-family: 'Cairo', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 102, 0, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 102, 0, 0.05) 0%, transparent 40%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/></svg>');
            background-attachment: fixed; overflow-x: hidden;
            scrollbar-width: thin; scrollbar-color: var(--orange-vivid) #000;
        }

        /* هيدر تطفو زجاجية */
        header {
            height: 90px; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(40px);
            border-bottom: 1px solid var(--glass-border); display: flex;
            align-items: center; justify-content: space-between; padding: 0 50px;
            position: fixed; top: 0; width: 100%; z-index: 1000;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        .logo-main { font-family: 'Orbitron'; font-weight: 900; font-size: 36px; color: var(--orange-vivid); text-shadow: 0 0 25px var(--orange-vivid); cursor: pointer; user-select: none; letter-spacing: 3px; }

        /* حاوية المحتوى الضخمة */
        .main-container { padding-top: 130px; display: flex; flex-direction: column; align-items: center; gap: 50px; padding-bottom: 80px; }
        
        /* كارت فيديو زجاجي مبهر */
        .post-card {
            width: 95%; max-width: 600px; border-radius: 40px; 
            background: var(--glass-base); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); overflow: hidden; 
            transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1); position: relative;
        }
        .post-card:hover { 
            transform: translateY(-15px) scale(1.03); 
            border-color: var(--orange-vivid); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 30px var(--orange-glow); 
        }
        .post-card::before {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(255, 102, 0, 0.05), transparent 70%);
            opacity: 0; transition: 0.6s; z-index: -1;
        }
        .post-card:hover::before { opacity: 1; }

        video { width: 100%; border-radius: 40px 40px 0 0; background: #000; aspect-ratio: 16/9; object-fit: cover; cursor: pointer; border-bottom: 1px solid var(--glass-border); }

        /* بار تفاعل طائر */
        .interact-bar { display: flex; justify-content: space-around; padding: 25px; background: rgba(0,0,0,0.3); }
        .btn-act { display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; transition: 0.3s; color: #888; font-size: 11px; font-weight: bold; font-family: 'Orbitron'; }
        .btn-act:hover { color: var(--orange-vivid); transform: translateY(-5px); text-shadow: 0 0 10px var(--orange-vivid); }
        .btn-act i { font-size: 24px; }

        /* زر رفع "التيتان" متوهج */
        .btn-titan {
            position: fixed; bottom: 50px; right: 50px; width: 85px; height: 85px;
            background: linear-gradient(45deg, var(--orange-vivid), #ff9900); color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 35px; cursor: pointer; z-index: 2000;
            box-shadow: 0 0 40px var(--orange-glow); border: none; transition: 0.4s;
        }
        .btn-titan:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 0 60px var(--orange-vivid); }
        
        /* لوحة تحكم أدمن "النظام الآلي" */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 60px; overflow-y: auto; font-family: 'Orbitron', sans-serif; }
        .admin-card { background: #050505; padding: 20px; rounded-xl: 15px; border: 1px solid rgba(255,0,0,0.2); transition: 0.3s; }
        .admin-card:hover { border-color: #ff4444; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .delete-btn { background: #ff4444; color: #fff; padding: 8px 20px; border-radius: 12px; font-size: 12px; margin-top: 15px; cursor: pointer; width: 100%; transition: 0.3s; }
        .delete-btn:hover { background: #fff; color: #ff4444; font-weight: bold; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .loader-text { font-family: 'Orbitron'; font-size: 14px; color: var(--orange-vivid); margin-top: 20px; letter-spacing: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-center">
            <div class="logo-main loader-logo">XRAWS</div>
            <div class="loader-text">INITIALIZING COSMIC VAULT...</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-12 border-b border-red-900 pb-6">
            <h2 class="text-3xl font-black text-red-500 tracking-widest">SYSTEM ADMINISTRATIVE INTERFACE</h2>
            <button onclick="closeAdmin()" class="text-white text-5xl hover:text-red-500 transition">&times;</button>
        </div>
        <div id="admin-list" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>

    <header>
        <div class="logo-main italic" id="logo-trigger">XRAWS</div>
        <div class="flex items-center gap-8 text-gray-400">
            <div class="text-sm font-bold text-orange-900/70 hidden lg:block">PREMIUM ARCHIVE 2026</div>
            <i class="fas fa-bars hover:text-orange-400 cursor-pointer text-2xl" onclick="openAd()"></i>
        </div>
    </header>

    <main class="main-container" id="feed-items">
        </main>

    <button class="btn-titan" id="btn-upload" title="Upload to Cosmic Vault"><i class="fas fa-cloud-upload-alt"></i></button>

    <script>
        const CONFIG = {
            db: "https://coco-88863-default-rtdb.firebaseio.com/",
            cloud: "dfscughol",
            preset: "titan_goo",
            ads: [
                "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
                "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
            ]
        };

        if (!firebase.apps.length) firebase.initializeApp({ databaseURL: CONFIG.db });
        const db = firebase.database();
        let currentAd = 0;

        function openAd() {
            const win = window.open(CONFIG.ads[currentAd], '_blank');
            if(win) currentAd = (currentAd + 1) % CONFIG.ads.length;
        }

        function downloadVideo(url, name) {
            openAd();
            const a = document.createElement('a');
            a.href = url;
            a.download = name || "xraws_cosmic.mp4";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        const widget = cloudinary.createUploadWidget({
            cloudName: CONFIG.cloud, uploadPreset: CONFIG.preset, resourceType: 'video'
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('xraws_main/').push({ 
                    url: res.info.secure_url, 
                    name: res.info.original_filename || "Cosmic Premium Raw",
                    likes: Math.floor(Math.random() * 500) + 100, // إعجابات وهمية للبداية
                    time: Date.now() 
                });
                openAd();
            }
        });

        document.getElementById("btn-upload").addEventListener('click', () => { openAd(); widget.open(); });

        db.ref('xraws_main').on('value', (snap) => {
            const container = document.getElementById('feed-items');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            document.getElementById('loader').style.display = 'none';
            container.innerHTML = ''; adminList.innerHTML = '';
            
            if(!data) {
                container.innerHTML = '<div class="text-gray-700 italic mt-32 text-center text-sm tracking-widest">THE VAULT IS CURRENTLY EMPTY...</div>';
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                // واجهة المستخدم الكونية
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <video loop playsinline src="${item.url}" onplay="openAd()" controls preload="metadata"></video>
                    <div class="px-6 pt-5 text-xs font-black text-orange-200/60 uppercase tracking-tighter h-10 overflow-hidden">${item.name || 'Premium Cosmic Raw'}</div>
                    <div class="interact-bar">
                        <div class="btn-act" onclick="handleLike('${id}')"><i class="fas fa-heart text-red-500"></i><span>${item.likes || 0}</span></div>
                        <div class="btn-act" onclick="downloadVideo('${item.url}', '${item.name}')"><i class="fas fa-download text-orange-400"></i><span>SAVE</span></div>
                        <div class="btn-act" onclick="openAd()"><i class="fas fa-comment-dots text-orange-400"></i><span>REPLY</span></div>
                        <div class="btn-act" onclick="openAd()"><i class="fas fa-satellite-dish text-orange-400"></i><span>SEND</span></div>
                    </div>`;
                container.appendChild(card);

                // واجهة الأدمن "النظام الآلي"
                adminList.innerHTML += `
                    <div class="admin-card">
                        <video src="${item.url}" class="w-full h-36 object-cover rounded-lg mb-3"></video>
                        <div class="text-[10px] text-gray-500 mb-2 truncate">${item.name}</div>
                        <button class="delete-btn" onclick="deletePost('${id}')">TERMINATE DATA</button>
                    </div>`;
            });
        });

        function handleLike(id) { openAd(); db.ref(`xraws_main/${id}/likes`).transaction(l => (l || 0) + 1); }

        // تفعيل لوحة التحكم السرية (اضغط مطولاً على اللوجو لـ 3 ثوانٍ)
        let logoTimer;
        const logoBtn = document.getElementById('logo-trigger');
        const triggerAdmin = () => logoTimer = setTimeout(() => { document.getElementById('admin-panel').style.display = 'block'; window.scrollTo(0, 0); }, 3000);
        
        logoBtn.addEventListener('mousedown', triggerAdmin);
        logoBtn.addEventListener('mouseup', () => clearTimeout(logoTimer));
        logoBtn.addEventListener('touchstart', triggerAdmin);
        logoBtn.addEventListener('touchend', () => clearTimeout(logoTimer));

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deletePost(id) { if(confirm('Are you sure you want to terminate this data permanently?')) db.ref(`xraws_main/${id}`).remove(); }

        document.body.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, {once: true});
    </script>
</body>
</html>
