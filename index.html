<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | PREMIUM GREEN ARCHIVE</title>
    
    <meta name="description" content="XRAWS - المنصة الأضخم للمحتوى الخام بتصميم زجاجي نيون">
    <link rel="canonical" href="https://jasim28v-cloud.github.io/gx/">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #00ff88; --glass: rgba(0, 255, 136, 0.05); }
        body { margin: 0; background: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        header {
            height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0,255,136,0.2); display: flex;
            align-items: center; justify-content: space-between; padding: 0 20px;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 28px; color: var(--neon); text-shadow: 0 0 15px var(--neon); cursor: pointer; }

        .feed { padding-top: 100px; display: flex; flex-direction: column; align-items: center; gap: 30px; padding-bottom: 50px; }
        .v-card {
            width: 95%; max-width: 500px; border-radius: 25px; border: 1px solid rgba(0,255,136,0.1);
            background: #050505; overflow: hidden; position: relative; transition: 0.3s;
        }
        .v-card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        video { width: 100%; display: block; border-bottom: 1px solid #111; min-height: 200px; background: #000; }

        .action-bar { display: flex; justify-content: space-around; padding: 15px; background: rgba(0,0,0,0.8); }
        .action-btn { cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; color: #666; }
        .action-btn:hover { color: var(--neon); transform: scale(1.1); }
        .action-btn i { font-size: 20px; }

        .footer { background: #020202; border-top: 1px solid #111; padding: 50px 20px; text-align: center; }
        .f-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; max-width: 600px; margin-left: auto; margin-right: auto; }
        .f-links a { color: #555; font-size: 11px; text-decoration: none; transition: 0.3s; }
        .f-links a:hover { color: var(--neon); }

        .upload-btn {
            position: fixed; bottom: 30px; left: 30px; width: 65px; height: 65px;
            background: var(--neon); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; z-index: 2000; box-shadow: 0 0 20px var(--neon);
        }
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }

        /* لوحة التحكم السرية للحذف */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; padding: 40px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin text-green-500 text-4xl"></i></div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10 text-red-500 font-bold">
            <h2 class="text-xl">SYSTEM DELETE CONTROL</h2>
            <button onclick="closeAdmin()" class="text-3xl">&times;</button>
        </div>
        <div id="admin-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <header>
        <div class="logo italic" id="admin-trigger">XRAWS</div>
        <i class="fas fa-search text-gray-500" onclick="triggerAd()"></i>
    </header>

    <main class="feed" id="main-feed"></main>

    <footer class="footer">
        <span class="logo italic text-2xl mb-4 block">XRAWS</span>
        <div class="f-links">
            <a href="#" onclick="triggerAd()">Terms</a> <a href="#" onclick="triggerAd()">Privacy</a> <a href="#" onclick="triggerAd()">DMCA</a>
            <a href="#" onclick="triggerAd()">Porn List</a> <a href="#" onclick="triggerAd()">Homemade</a> <a href="#" onclick="triggerAd()">Premium</a>
        </div>
        <p class="text-gray-700 text-[10px] mt-4">© Xraws.com, 2026</p>
    </footer>

    <div class="upload-btn" id="upload-action"><i class="fas fa-plus"></i></div>

    <script>
        const CONFIG = {
            firebaseURL: "https://coco-88863-default-rtdb.firebaseio.com/",
            cloudName: "dfscughol",
            uploadPreset: "titan_goo",
            ads: [
                "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
                "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
            ]
        };

        if (!firebase.apps.length) firebase.initializeApp({ databaseURL: CONFIG.firebaseURL });
        const db = firebase.database();
        let currentAdIdx = 0;

        function triggerAd() {
            window.open(CONFIG.ads[currentAdIdx], '_blank');
            currentAdIdx = (currentAdIdx + 1) % CONFIG.ads.length;
        }

        // دالة التحميل المباشر
        function downloadVideo(url) {
            triggerAd();
            const a = document.createElement('a');
            a.href = url;
            a.download = "xraws_video.mp4";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        const widget = cloudinary.createUploadWidget({ 
            cloudName: CONFIG.cloudName, 
            uploadPreset: CONFIG.uploadPreset,
            resourceType: 'video'
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('xraws_posts/').push({ url: res.info.secure_url, likes: 0, time: Date.now() });
                triggerAd();
            }
        });
        
        document.getElementById("upload-action").onclick = () => { triggerAd(); widget.open(); };

        db.ref('xraws_posts').on('value', (snap) => {
            const feed = document.getElementById('main-feed');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            document.getElementById('loader').style.display = 'none';
            
            feed.innerHTML = ''; adminList.innerHTML = '';
            if(!data) {
                feed.innerHTML = '<p class="mt-20 text-gray-600 italic">No Content Available</p>';
                return;
            }
            
            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                // واجهة الزوار
                const card = document.createElement('div');
                card.className = 'v-card';
                card.innerHTML = `
                    <video controls playsinline src="${item.url}" onplay="triggerAd()"></video>
                    <div class="action-bar">
                        <div class="action-btn" onclick="handleLike('${id}')">
                            <i class="fas fa-heart text-red-500"></i>
                            <span class="text-[10px] font-bold">${item.likes || 0}</span>
                        </div>
                        <div class="action-btn" onclick="downloadVideo('${item.url}')">
                            <i class="fas fa-download text-green-500"></i>
                            <span class="text-[10px] font-bold">SAVE</span>
                        </div>
                        <div class="action-btn" onclick="triggerAd()">
                            <i class="fas fa-comment text-blue-500"></i>
                            <span class="text-[10px] font-bold">CHAT</span>
                        </div>
                        <div class="action-btn" onclick="triggerAd()">
                            <i class="fas fa-share-alt text-yellow-500"></i>
                            <span class="text-[10px] font-bold">SHARE</span>
                        </div>
                    </div>`;
                feed.appendChild(card);

                // واجهة الإدارة المخفية
                adminList.innerHTML += `
                    <div class="bg-gray-900 p-4 rounded-xl border border-red-900/50">
                        <video src="${item.url}" class="w-full h-32 object-cover rounded mb-4"></video>
                        <button onclick="deletePost('${id}')" class="bg-red-600 w-full py-2 rounded text-xs">DELETE VIDEO</button>
                    </div>`;
            });
        });

        function handleLike(id) { triggerAd(); db.ref(`xraws_posts/${id}/likes`).transaction(l => (l || 0) + 1); }

        // تفعيل الإدارة (اضغط مطولاً على اللوجو 3 ثوانٍ)
        let holdTimer;
        const trigger = document.getElementById('admin-trigger');
        trigger.onmousedown = () => holdTimer = setTimeout(() => document.getElementById('admin-panel').style.display = 'block', 3000);
        trigger.onmouseup = () => clearTimeout(holdTimer);
        trigger.ontouchstart = () => holdTimer = setTimeout(() => document.getElementById('admin-panel').style.display = 'block', 3000);
        trigger.ontouchend = () => clearTimeout(holdTimer);

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deletePost(id) { if(confirm('Delete permanently?')) db.ref(`xraws_posts/${id}`).remove(); }

        document.addEventListener('click', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once: true});
    </script>
</body>
</html>
