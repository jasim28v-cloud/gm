<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | EMERALD GLASS 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        
        :root {
            --emerald: #00ff88;
            --emerald-glow: rgba(0, 255, 136, 0.3);
            --bg-deep: #000502;
            --glass-card: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(0, 255, 136, 0.15);
        }

        body {
            margin: 0; background: var(--bg-deep); color: #fff; font-family: 'Cairo', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #002211 0%, transparent 50%);
            background-attachment: fixed;
        }

        header {
            height: 80px; background: rgba(0, 5, 2, 0.8); backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border); display: flex;
            align-items: center; justify-content: space-between; padding: 0 25px;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .logo-emerald {
            font-family: 'Orbitron'; font-weight: 900; font-size: 30px;
            color: var(--emerald); text-shadow: 0 0 20px var(--emerald-glow);
            cursor: pointer; letter-spacing: 2px;
        }

        .main-feed {
            padding-top: 110px; display: flex; flex-direction: column;
            align-items: center; gap: 35px; padding-bottom: 100px;
        }

        .v-card-glass {
            width: 92%; max-width: 520px; border-radius: 30px;
            background: var(--glass-card); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .v-card-glass:hover { border-color: var(--emerald); box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); }

        video { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; border-bottom: 1px solid var(--glass-border); }

        .action-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 18px; background: rgba(0, 255, 136, 0.02);
        }

        .action-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; transition: 0.3s; color: #777;
        }

        .action-item:hover { color: var(--emerald); transform: translateY(-3px); }
        .action-item i { font-size: 20px; }
        .action-item span { font-size: 9px; font-weight: 900; font-family: 'Orbitron'; }

        .btn-upload-emerald {
            position: fixed; bottom: 35px; left: 35px; width: 70px; height: 70px;
            background: var(--emerald); color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; z-index: 2000;
            box-shadow: 0 0 30px var(--emerald-glow); transition: 0.3s;
            border: none;
        }
        .btn-upload-emerald:hover { transform: scale(1.1) rotate(90deg); }

        #emerald-loader {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        #admin-vault {
            display: none; position: fixed; inset: 0; background: rgba(0,5,2,0.98);
            z-index: 5000; padding: 50px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="emerald-loader">
        <div class="text-center">
            <div class="logo-emerald animate-pulse">XRAWS</div>
            <div class="mt-3 text-emerald-500/50 text-[10px] tracking-[4px]">EMERALD ARCHIVE</div>
        </div>
    </div>

    <div id="admin-vault">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-emerald-500 font-black text-2xl tracking-widest">CONTROL VAULT</h2>
            <button onclick="closeVault()" class="text-white text-5xl">&times;</button>
        </div>
        <div id="vault-items" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <header>
        <div class="logo-emerald italic" id="vault-trigger">XRAWS</div>
        <i class="fas fa-search text-emerald-900 text-xl cursor-pointer" onclick="openAd()"></i>
    </header>

    <main class="main-feed" id="content-feed"></main>

    <button class="btn-upload-emerald" id="start-upload"><i class="fas fa-plus"></i></button>

    <script>
        const CONFIG = {
            firebase: "https://soko-7d03e-default-rtdb.firebaseio.com/",
            cloudName: "dfscughol",
            preset: "update_vk",
            ads: [
                "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
                "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
            ]
        };

        firebase.initializeApp({ databaseURL: CONFIG.firebase });
        const db = firebase.database();
        let adIndex = 0;

        function openAd() {
            window.open(CONFIG.ads[adIndex], '_blank');
            adIndex = (adIndex + 1) % CONFIG.ads.length;
        }

        // إعداد الرفع - مجاني تماماً كما طلبت
        const uploader = cloudinary.createUploadWidget({
            cloudName: CONFIG.cloudName, 
            uploadPreset: CONFIG.preset,
            resourceType: 'video'
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('emerald_archive/').push({
                    url: res.info.secure_url,
                    likes: 0,
                    time: Date.now()
                });
            }
        });

        document.getElementById("start-upload").onclick = () => uploader.open();

        db.ref('emerald_archive').on('value', (snap) => {
            const feed = document.getElementById('content-feed');
            const vault = document.getElementById('vault-items');
            const data = snap.val();
            
            document.getElementById('emerald-loader').style.display = 'none';
            feed.innerHTML = ''; vault.innerHTML = '';

            if(!data) {
                feed.innerHTML = `<div class="opacity-10 text-center mt-40">
                    <i class="fas fa-leaf text-6xl mb-4"></i>
                    <p class="tracking-widest">NO ASSETS FOUND</p>
                </div>`;
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                
                feed.innerHTML += `
                    <div class="v-card-glass">
                        <video loop playsinline src="${item.url}" controls></video>
                        <div class="action-grid">
                            <div class="action-item" onclick="handleLike('${id}')">
                                <i class="fas fa-heart text-red-500"></i><span>${item.likes || 0}</span>
                            </div>
                            <div class="action-item" onclick="openAd(); window.open('${item.url}', '_blank')">
                                <i class="fas fa-download text-emerald-500"></i><span>SAVE</span>
                            </div>
                            <div class="action-item" onclick="openAd()">
                                <i class="fas fa-comment-dots text-blue-400"></i><span>CHAT</span>
                            </div>
                            <div class="action-item" onclick="openAd()">
                                <i class="fas fa-share-nodes text-orange-400"></i><span>SHARE</span>
                            </div>
                        </div>
                    </div>`;

                vault.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-3xl border border-white/10">
                        <video src="${item.url}" class="h-32 w-full object-cover rounded-2xl mb-4"></video>
                        <button onclick="confirmDelete('${id}')" class="w-full py-3 bg-red-600/10 text-red-500 rounded-xl font-bold hover:bg-red-600 hover:text-white transition">REMOVE</button>
                    </div>`;
            });
        });

        function handleLike(id) {
            openAd();
            db.ref(`emerald_archive/${id}/likes`).transaction(l => (l || 0) + 1);
        }

        let hold;
        const trigger = document.getElementById('vault-trigger');
        trigger.onmousedown = () => hold = setTimeout(() => document.getElementById('admin-vault').style.display = 'block', 3000);
        trigger.onmouseup = () => clearTimeout(hold);
        trigger.ontouchstart = () => hold = setTimeout(() => document.getElementById('admin-vault').style.display = 'block', 3000);
        trigger.ontouchend = () => clearTimeout(hold);

        function closeVault() { document.getElementById('admin-vault').style.display = 'none'; }
        function confirmDelete(id) { if(confirm('حذف نهائي؟')) db.ref(`emerald_archive/${id}`).remove(); }
    </script>
</body>
</html>
