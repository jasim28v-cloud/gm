<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | COSMIC GLASS 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        :root { --orange-vivid: #ff6600; --orange-glow: rgba(255, 102, 0, 0.4); --bg-deep: #010101; --glass-border: rgba(255, 102, 0, 0.12); }
        body { margin: 0; background: var(--bg-deep); color: #fff; font-family: 'Cairo', sans-serif; background-image: radial-gradient(circle at 10% 10%, rgba(255, 102, 0, 0.08) 0%, transparent 40%); background-attachment: fixed; }
        header { height: 90px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(40px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo-main { font-family: 'Orbitron'; font-weight: 900; font-size: 36px; color: var(--orange-vivid); text-shadow: 0 0 25px var(--orange-vivid); cursor: pointer; }
        .main-container { padding-top: 130px; display: flex; flex-direction: column; align-items: center; gap: 50px; padding-bottom: 80px; min-height: 80vh; }
        .post-card { width: 95%; max-width: 600px; border-radius: 40px; background: rgba(255,255,255,0.015); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); overflow: hidden; transition: 0.6s; }
        video { width: 100%; border-radius: 40px 40px 0 0; background: #000; aspect-ratio: 16/9; object-fit: cover; }
        .interact-bar { display: flex; justify-content: space-around; padding: 25px; background: rgba(0,0,0,0.3); }
        .btn-act { display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; color: #888; font-size: 11px; font-weight: bold; font-family: 'Orbitron'; }
        .btn-act:hover { color: var(--orange-vivid); transform: translateY(-5px); }
        .btn-act i { font-size: 24px; }
        .btn-titan { position: fixed; bottom: 50px; right: 50px; width: 85px; height: 85px; background: linear-gradient(45deg, var(--orange-vivid), #ff9900); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; z-index: 2000; box-shadow: 0 0 40px var(--orange-glow); border: none; }
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; padding: 60px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="text-center">
            <div class="logo-main animate-pulse">XRAWS</div>
            <div class="text-orange-500 mt-4 tracking-widest text-xs font-bold">PREPARING INTERFACE...</div>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-10"><h2 class="text-2xl font-black text-red-500">ADMIN</h2><button onclick="closeAdmin()" class="text-white text-5xl">&times;</button></div>
        <div id="admin-list" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </div>

    <header><div class="logo-main italic" id="logo-trigger">XRAWS</div><i class="fas fa-bars hover:text-orange-400 cursor-pointer text-2xl" onclick="openAd()"></i></header>
    <main class="main-container" id="feed-items"></main>
    
    <button class="btn-titan" id="btn-upload"><i class="fas fa-cloud-upload-alt"></i></button>

    <script>
        const CONFIG = {
            db: "https://coco-88863-default-rtdb.firebaseio.com/",
            cloud: "dfscughol",
            preset: "titan_goo",
            ads: [
                "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", 
                "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
            ]
        };

        firebase.initializeApp({ databaseURL: CONFIG.db });
        const db = firebase.database();
        let currentAd = 0;

        // دالة فتح الإعلان
        function openAd() { 
            window.open(CONFIG.ads[currentAd], '_blank'); 
            currentAd = (currentAd + 1) % CONFIG.ads.length; 
        }

        const widget = cloudinary.createUploadWidget({
            cloudName: CONFIG.cloud, uploadPreset: CONFIG.preset, resourceType: 'video'
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('xraws_main/').push({ url: res.info.secure_url, name: res.info.original_filename, likes: 0, time: Date.now() });
                openAd(); // إعلان بعد النجاح أيضاً
            }
        });

        // ربط زر الرفع بالإعلان
        document.getElementById("btn-upload").addEventListener('click', () => { 
            openAd(); // يفتح الإعلان أولاً
            widget.open(); // ثم يفتح نافذة الرفع
        });

        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);

        db.ref('xraws_main').on('value', (snap) => {
            document.getElementById('loader').style.display = 'none';
            const container = document.getElementById('feed-items');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            
            if(!data) {
                container.innerHTML = '<div class="text-orange-900/40 mt-32 text-center tracking-widest text-sm">NO CONTENT YET.</div>';
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                container.innerHTML += `
                    <div class="post-card">
                        <video loop playsinline src="${item.url}" onplay="openAd()" controls></video>
                        <div class="interact-bar">
                            <div class="btn-act" onclick="handleLike('${id}')"><i class="fas fa-heart text-red-500"></i><span>${item.likes || 0}</span></div>
                            <div class="btn-act" onclick="openAd(); window.open('${item.url}', '_blank')"><i class="fas fa-download text-orange-400"></i><span>SAVE</span></div>
                            <div class="btn-act" onclick="openAd()"><i class="fas fa-comment-dots text-orange-400"></i><span>REPLY</span></div>
                            <div class="btn-act" onclick="openAd()"><i class="fas fa-share text-orange-400"></i><span>SEND</span></div>
                        </div>
                    </div>`;
                adminList.innerHTML += `<div class="p-4 bg-gray-900 rounded-xl"><video src="${item.url}" class="w-full h-32 object-cover"></video><button class="bg-red-600 w-full mt-2 py-2 rounded" onclick="deletePost('${id}')">DELETE</button></div>`;
            });
        });

        function handleLike(id) { openAd(); db.ref(`xraws_main/${id}/likes`).transaction(l => (l || 0) + 1); }
        let logoTimer;
        const logoBtn = document.getElementById('logo-trigger');
        logoBtn.addEventListener('mousedown', () => logoTimer = setTimeout(() => document.getElementById('admin-panel').style.display = 'block', 3000));
        logoBtn.addEventListener('mouseup', () => clearTimeout(logoTimer));
        logoBtn.addEventListener('touchstart', () => logoTimer = setTimeout(() => document.getElementById('admin-panel').style.display = 'block', 3000));
        logoBtn.addEventListener('touchend', () => clearTimeout(logoTimer));
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deletePost(id) { if(confirm('Delete?')) db.ref(`xraws_main/${id}`).remove(); }
    </script>
</body>
</html>
