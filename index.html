<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XRAWS | ULTRA PREMIUM 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@400;700;900&display=swap');
        
        :root {
            --accent: #bc13fe;
            --accent-glow: rgba(188, 19, 254, 0.5);
            --bg: #030005;
            --card-bg: rgba(20, 10, 25, 0.7);
        }

        body {
            margin: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif;
            background-image: radial-gradient(circle at top right, #1a0033 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #0d001a 0%, transparent 40%);
            background-attachment: fixed;
        }

        header {
            height: 85px; background: rgba(0,0,0,0.85); backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(188, 19, 254, 0.3); display: flex;
            align-items: center; justify-content: space-between; padding: 0 25px;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .logo-premium {
            font-family: 'Orbitron'; font-weight: 900; font-size: 32px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--accent-glow)); cursor: pointer;
        }

        .main-feed {
            padding-top: 120px; display: flex; flex-direction: column;
            align-items: center; gap: 40px; padding-bottom: 100px;
        }

        .video-card {
            width: 92%; max-width: 550px; border-radius: 35px;
            background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.5s;
        }

        .video-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        video { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #000; }

        .controls-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 20px; background: rgba(0,0,0,0.4);
        }

        .nav-tool {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.3s; color: #aaa;
        }

        .nav-tool:hover { color: var(--accent); transform: scale(1.1); }
        .nav-tool i { font-size: 22px; }
        .nav-tool span { font-size: 10px; font-weight: 900; font-family: 'Orbitron'; }

        .btn-upload-clean {
            position: fixed; bottom: 40px; right: 40px; width: 75px; height: 75px;
            background: var(--accent); color: #fff; border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; z-index: 2000;
            box-shadow: 0 10px 30px var(--accent-glow); transition: 0.4s;
            border: none; transform: rotate(45deg);
        }
        .btn-upload-clean i { transform: rotate(-45deg); }
        .btn-upload-clean:hover { transform: rotate(45deg) scale(1.1); filter: brightness(1.2); }

        #glass-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        #admin-vault {
            display: none; position: fixed; inset: 0; background: rgba(5,0,10,0.98);
            z-index: 5000; padding: 50px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="glass-loader">
        <div class="text-center">
            <div class="logo-premium animate-pulse">XRAWS</div>
            <div class="mt-4 text-purple-400 text-xs tracking-[5px]">ULTRA PREMIUM</div>
        </div>
    </div>

    <div id="admin-vault">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-purple-500 font-black text-2xl tracking-widest">MANAGEMENT VAULT</h2>
            <button onclick="closeVault()" class="text-white text-5xl">&times;</button>
        </div>
        <div id="vault-items" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>

    <header>
        <div class="logo-premium italic" id="vault-trigger">XRAWS</div>
        <div class="flex gap-5 items-center">
            <i class="fas fa-crown text-yellow-500 text-xl"></i>
            <i class="fas fa-bars text-white text-2xl cursor-pointer" onclick="openAd()"></i>
        </div>
    </header>

    <main class="main-feed" id="content-feed"></main>

    <button class="btn-upload-clean" id="start-upload"><i class="fas fa-plus"></i></button>

    <script>
        const MASTER_CONFIG = {
            firebase: "https://soko-7d03e-default-rtdb.firebaseio.com/",
            cloudName: "dfscughol",
            preset: "update_vk",
            ads: [
                "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
                "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
            ]
        };

        firebase.initializeApp({ databaseURL: MASTER_CONFIG.firebase });
        const db = firebase.database();
        let adStep = 0;

        function openAd() {
            window.open(MASTER_CONFIG.ads[adStep], '_blank');
            adStep = (adStep + 1) % MASTER_CONFIG.ads.length;
        }

        // إعداد الرفع - بدون إعلانات عند الضغط
        const uploader = cloudinary.createUploadWidget({
            cloudName: MASTER_CONFIG.cloudName, 
            uploadPreset: MASTER_CONFIG.preset,
            resourceType: 'video'
        }, (err, res) => {
            if (res.event === "success") {
                db.ref('premium_archive/').push({
                    url: res.info.secure_url,
                    likes: 0,
                    timestamp: Date.now()
                });
            }
        });

        document.getElementById("start-upload").onclick = () => uploader.open();

        // جلب البيانات وتحديث الواجهة
        db.ref('premium_archive').on('value', (snap) => {
            const feed = document.getElementById('content-feed');
            const vault = document.getElementById('vault-items');
            const data = snap.val();
            
            document.getElementById('glass-loader').style.display = 'none';
            feed.innerHTML = ''; vault.innerHTML = '';

            if(!data) {
                feed.innerHTML = `<div class="opacity-20 text-center mt-40">
                    <i class="fas fa-folder-open text-6xl mb-4"></i>
                    <p class="tracking-widest">ARCHIVE EMPTY</p>
                </div>`;
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const item = data[id];
                
                // الكارت الرئيسي
                feed.innerHTML += `
                    <div class="video-card">
                        <video loop playsinline src="${item.url}" onplay="openAd()" controls></video>
                        <div class="controls-grid">
                            <div class="nav-tool" onclick="handleLike('${id}')">
                                <i class="fas fa-heart text-red-500"></i><span>${item.likes || 0}</span>
                            </div>
                            <div class="nav-tool" onclick="openAd(); window.open('${item.url}', '_blank')">
                                <i class="fas fa-arrow-down text-purple-500"></i><span>SAVE</span>
                            </div>
                            <div class="nav-tool" onclick="openAd()">
                                <i class="fas fa-comment-alt text-blue-500"></i><span>CHAT</span>
                            </div>
                            <div class="nav-tool" onclick="openAd()">
                                <i class="fas fa-paper-plane text-green-500"></i><span>SHARE</span>
                            </div>
                        </div>
                    </div>`;

                // كارت الإدارة
                vault.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-3xl border border-white/10">
                        <video src="${item.url}" class="h-32 w-full object-cover rounded-2xl mb-4"></video>
                        <button onclick="confirmDelete('${id}')" class="w-full py-3 bg-red-600/20 text-red-500 rounded-xl font-bold hover:bg-red-600 hover:text-white transition">DELETE VIDEO</button>
                    </div>`;
            });
        });

        function handleLike(id) {
            openAd();
            db.ref(`premium_archive/${id}/likes`).transaction(l => (l || 0) + 1);
        }

        // لوحة التحكم (اضغط مطولاً على XRAWS)
        let timer;
        const trigger = document.getElementById('vault-trigger');
        trigger.onmousedown = () => timer = setTimeout(() => document.getElementById('admin-vault').style.display = 'block', 3000);
        trigger.onmouseup = () => clearTimeout(timer);
        trigger.ontouchstart = () => timer = setTimeout(() => document.getElementById('admin-vault').style.display = 'block', 3000);
        trigger.ontouchend = () => clearTimeout(timer);

        function closeVault() { document.getElementById('admin-vault').style.display = 'none'; }
        function confirmDelete(id) { if(confirm('حذف نهائي؟')) db.ref(`premium_archive/${id}`).remove(); }

        // تفعيل الصوت
        document.addEventListener('click', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once: true});
    </script>
</body>
</html>
